name: Docker Build & Push

on:
  push:
    branches:
      - main # Runs the workflow on push to the main branch
  pull_request:
    branches:
      - main # Runs the workflow on pull request to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

  # This step pulls the latest version of the repository into the GitHub runner:

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build Docker Image
        run: docker build -t myusername/myapp:latest .

      - name: Push Docker Image to Docker Hub
        run: docker push myusername/myapp:latest
