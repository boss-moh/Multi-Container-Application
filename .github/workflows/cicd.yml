name: CI/CD Pipeline — Node.js to Render

on:
  push:
    branches:
      - main # Runs the workflow on push to the main branch
  pull_request:
    branches:
      - main # Runs the workflow on pull request to the main branch

# Only run when a PR is actually merged (not just closed)
jobs:
  # ─────────────────────────────────────────
  # STAGE 1 — Install & Cache
  # ─────────────────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

  # ─────────────────────────────────────────
  # STAGE 2 — Lint & Format
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npm run lint
        # Tip: add "lint": "eslint . --ext .js" to your package.json scripts

  # ─────────────────────────────────────────
  # STAGE 3 — Tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Run tests with coverage
        run: npm test -- --coverage
        # Tip: add "test": "jest" to your package.json scripts

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────
  # STAGE 4 — Security Audit
  # ─────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Audit dependencies
        run: npm audit --audit-level=high
        # Fails the pipeline if any HIGH or CRITICAL vulnerabilities are found

